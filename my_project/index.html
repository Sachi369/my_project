<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Static Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        header {
            background: #4CAF50;
            color: white;
            padding: 40px 20px;
        }
        main {
            padding: 40px 20px;
        }
        footer {
            background: #333;
            color: white;
            padding: 20px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
        a.button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        a.button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Static Website</h1>
        <p>Simple HTML page ready to host for free</p>
    </header>
    <main>
        <h2>About This Page</h2>
        <p>This is a basic static website created with HTML and CSS. You can edit this text and add more content.</p>
        <a class="button" href="#contact">Contact Me</a>
    </main>
    <footer>
        &copy; 2026 My Static Website
    </footer>
</body>
</html>
